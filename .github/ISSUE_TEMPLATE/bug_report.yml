name: Bug report
description: Report a reproducible defect in PPT Creator
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include API keys, provider credentials, private documents, or generated presentations.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Branch name, release, or commit SHA where the problem occurs.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker Compose
        - Local frontend and backend
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open …
        2. Select …
        3. See …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove credentials, document contents, and personal information before pasting logs.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed secrets and private content from this report.
          required: true
