services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ppt_creator
      POSTGRES_USER: ppt_creator
      POSTGRES_PASSWORD: ppt_creator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppt_creator -d ppt_creator"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ppt_creator:ppt_creator@postgres:5432/ppt_creator
      WEB_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
