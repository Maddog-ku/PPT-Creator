services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ppt_creator
      POSTGRES_USER: ppt_creator
      POSTGRES_PASSWORD: ppt_creator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppt_creator -d ppt_creator"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ppt_creator:ppt_creator@postgres:5432/ppt_creator
      WEB_ORIGIN: http://localhost:3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gpt-oss:20b
      OLLAMA_TIMEOUT_SECONDS: 300
      AI_CONFIG_SECRET: ${AI_CONFIG_SECRET:-ppt-creator-local-development-secret}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
